plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def googleServicesConfigFiles = [
    file("google-services.json"),
    file("src/${gradle.startParameter.taskNames.any { it.toLowerCase().contains('release') } ? 'release' : 'debug'}/google-services.json"),
    file("src/google-services.json"),
]

def releaseKeystoreProperties = new Properties()
def releaseKeystorePropertiesFile = rootProject.file("key.properties")
if (releaseKeystorePropertiesFile.exists()) {
    releaseKeystorePropertiesFile.withInputStream { releaseKeystoreProperties.load(it) }
}

def releaseSigningValue = { propertyName, envName ->
    def propertyValue = releaseKeystoreProperties.getProperty(propertyName)
    return propertyValue ?: System.getenv(envName)
}

def releaseStoreFile = releaseSigningValue("storeFile", "ONTIME_ANDROID_KEYSTORE_PATH")
def releaseStorePassword = releaseSigningValue("storePassword", "ONTIME_ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = releaseSigningValue("keyAlias", "ONTIME_ANDROID_KEY_ALIAS")
def releaseKeyPassword = releaseSigningValue("keyPassword", "ONTIME_ANDROID_KEY_PASSWORD")
def releaseStoreFileObject = releaseStoreFile ? new File(releaseStoreFile) : null
def hasReleaseSigningConfig = [
    releaseStoreFile,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword
].every { it != null && it.toString().trim() }

def androidReleaseSigningMessage = """Missing Android release signing config.
Provide android/key.properties with storeFile, storePassword, keyAlias, and keyPassword,
or set ONTIME_ANDROID_KEYSTORE_PATH, ONTIME_ANDROID_KEYSTORE_PASSWORD,
ONTIME_ANDROID_KEY_ALIAS, and ONTIME_ANDROID_KEY_PASSWORD."""

if (googleServicesConfigFiles.any { it.exists() }) {
    apply plugin: "com.google.gms.google-services"
} else {
    logger.lifecycle("google-services.json not found; skipping Google Services plugin for this local build.")
}

android {
    namespace = "club.devkor.ontime"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    signingConfigs {
        if (hasReleaseSigningConfig) {
            release {
                storeFile = releaseStoreFileObject.isAbsolute() ? releaseStoreFileObject : rootProject.file(releaseStoreFile)
                storePassword = releaseStorePassword
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
            }
        }
    }

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "club.devkor.ontime"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders = [
            applicationName: "android.app.Application",
            appAuthRedirectScheme: applicationId
        ]
    }

    buildTypes {
        release {
            if (hasReleaseSigningConfig) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    def runsReleaseTask = taskGraph.allTasks.any { it.name.toLowerCase().contains("release") }
    if (runsReleaseTask && !hasReleaseSigningConfig) {
        throw new GradleException(androidReleaseSigningMessage)
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
